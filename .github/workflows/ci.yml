name: Build and Run

on:
  push:
  pull_request:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libtiff-dev

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build --parallel

    - name: Run segmentation
      run: |
        set -e
        mkdir -p examples/output

        for f in examples/input/*.tif; do
          echo "Processing $f"
          ./build/multi_otsu_cli "$f" "examples/output/$(basename "$f")"
        done

    - name: Upload outputs
      uses: actions/upload-artifact@v4
      with:
        name: segmented-images
        path: examples/output/