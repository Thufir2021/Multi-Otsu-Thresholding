name: CI

on:
  push:
  pull_request:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libtiff-dev cmake

    - name: Configure
      run: cmake -B build

    - name: Build
      run: cmake --build build --parallel

    - name: Run segmentation
      run: |
        set -e
        mkdir -p examples/output

        shopt -s nullglob
        files=(examples/input/*.tif)

        if [ ${#files[@]} -eq 0 ]; then
          echo "No input TIFFs found in examples/input/"
          exit 1
        fi

        for f in "${files[@]}"; do
          echo "Processing $f"
          ./build/multi_otsu_cli "$f" "examples/output/$(basename "$f")"
        done

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: segmented-images
        path: examples/output/